<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Profil Kelompok Windows 1</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background: #1e1e1e;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #60a5fa;
            margin: 0 0 5px 0;
        }

        h3 {
            color: #9ca3af;
            margin: 0 0 20px 0;
            font-weight: normal;
        }

        .motto {
            background: #000;
            color: #34d399;
            padding: 12px;
            border-left: 4px solid #3b82f6;
            font-family: monospace;
            margin: 20px 0;
            border-radius: 4px;
        }

        .status {
            color: #10b981;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Server Debian 13</h1>
        <h3>Kelompok Windows 1 (SI-2025A)</h3>

        <p><strong>Anggota:</strong> Andi, Budi, Citra</p>

        <div class="motto">
            > "CLI is freedom"
        </div>

        <div class="status">
            ● NGINX ACTIVE (RUNNING)
        </div>
    </div>
</body>

</html>
